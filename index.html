<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Concierge — Executive Suite</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --text-2: #6b7280;
      --text-3: #9ca3af;
      --accent: #1d4ed8;
      --accent-bg: #eff6ff;
      --amber: #f59e0b;
      --amber-bg: #fffbeb;
      --amber-border: #fcd34d;
      --red: #ef4444;
      --red-bg: #fef2f2;
      --red-border: #fca5a5;
      --green: #16a34a;
      --green-bg: #f0fdf4;
      --green-border: #86efac;
      --r: 8px;
      --sh: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

    /* ── App shell ── */
    .app-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 54px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
    .app-title { font-size: 15px; font-weight: 700; }
    .app-sub { font-size: 12px; color: var(--text-2); }
    .main { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* ── Loading ── */
    .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 900; }
    .spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    .spinner-sm { width: 18px; height: 18px; border-width: 2px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-msg { font-size: 13px; color: var(--text-2); }
    .section-loading { display: flex; align-items: center; gap: 10px; padding: 28px 20px; color: var(--text-2); font-size: 13px; }

    /* ── Error ── */
    .error-banner { background: var(--red-bg); border: 1px solid var(--red-border); border-radius: var(--r); padding: 14px 18px; color: #dc2626; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }

    /* ── Filter bar ── */
    .filter-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .filter-btns { display: flex; gap: 3px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 3px; }
    .filter-btn { padding: 5px 13px; border: none; background: transparent; border-radius: 4px; cursor: pointer; font-size: 13px; color: var(--text-2); transition: all .12s; white-space: nowrap; }
    .filter-btn.active { background: var(--text); color: #fff; }
    .search-input { flex: 1; max-width: 300px; padding: 7px 11px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; background: var(--surface); }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
    .count-label { font-size: 12px; color: var(--text-3); margin-left: auto; }

    /* ── Table ── */
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; box-shadow: var(--sh); }
    table { width: 100%; border-collapse: collapse; }
    thead th { background: #f9fafb; padding: 9px 15px; text-align: left; font-size: 11px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f9fafb; }
    td { padding: 11px 15px; vertical-align: middle; }
    .exec-name-link { font-weight: 500; color: var(--accent); }
    .empty-cell { color: var(--text-3); }

    /* ── Badges ── */
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .b-gray { background: #f3f4f6; color: #6b7280; }
    .b-blue { background: #eff6ff; color: #1d4ed8; }
    .b-green { background: var(--green-bg); color: var(--green); }
    .b-amber { background: var(--amber-bg); color: #b45309; }
    .b-red { background: var(--red-bg); color: #dc2626; }

    .pill { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 700; margin-right: 3px; }
    .pill-cc { background: #e0f2fe; color: #0369a1; }
    .pill-t  { background: #fce7f3; color: #9d174d; }
    .pill-360{ background: #f3e8ff; color: #6d28d9; }

    /* ── Detail view ── */
    .back-btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text-2); margin-bottom: 16px; transition: all .12s; }
    .back-btn:hover { background: var(--bg); color: var(--text); }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--sh); margin-bottom: 16px; }
    .card-header { padding: 13px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-2); }
    .card-body { padding: 20px; }

    .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 16px; }
    .info-item label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-3); margin-bottom: 3px; }
    .info-item .val { font-size: 14px; color: var(--text); }
    .info-item .val a { color: var(--accent); text-decoration: none; }
    .info-item .val a:hover { text-decoration: underline; }
    .info-item .val.empty { color: var(--text-3); font-style: italic; }

    .exec-header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }
    .exec-name-h1 { font-size: 22px; font-weight: 700; }
    .exec-org { color: var(--text-2); margin-top: 2px; font-size: 14px; }

    /* ── Coach slots (legacy, used in tri/360) ── */
    .coach-slot { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .coach-slot:last-child { border-bottom: none; }
    .coach-num { width: 22px; height: 22px; background: var(--bg); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--text-2); flex-shrink: 0; }
    .coach-name-col { flex: 1; font-weight: 500; }
    .coach-unassigned { color: var(--text-3); font-style: italic; font-weight: 400; }

    /* ── Stage-aware Coach Cards (CC section) ── */
    .coach-cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    @media (max-width: 800px) { .coach-cards { grid-template-columns: 1fr; } }
    .coach-card { border: 1px solid var(--border); border-radius: 7px; padding: 14px; background: var(--bg); }
    .coach-card.warn { border-color: var(--amber-border); background: var(--amber-bg); }
    .coach-card-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-3); margin-bottom: 5px; }
    .coach-card-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .coach-card-email { font-size: 12px; color: var(--text-2); margin-bottom: 10px; }
    .booking-row { display: flex; align-items: center; gap: 6px; }
    .booking-preview { font-size: 11px; color: var(--text-3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; max-width: 160px; }
    .warn-note { font-size: 12px; color: #b45309; margin-top: 6px; display: flex; align-items: center; gap: 4px; }

    /* ── Session Cards (Stage 2) ── */
    .session-cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin: 14px 0; }
    @media (max-width: 800px) { .session-cards { grid-template-columns: 1fr; } }
    .session-card { border: 1px solid var(--border); border-radius: 7px; padding: 14px; background: var(--surface); }
    .session-card.complete { border-color: var(--green-border); background: var(--green-bg); }
    .session-not-booked { color: var(--text-3); font-style: italic; font-size: 13px; margin-top: 6px; }
    .session-complete-mark { color: var(--green); font-size: 13px; font-weight: 600; margin-top: 6px; }

    /* ── Callouts ── */
    .callout { padding: 13px 16px; border-radius: 7px; font-size: 13px; margin-bottom: 14px; }
    .callout-green { background: var(--green-bg); border: 1px solid var(--green-border); color: #15803d; }
    .callout-amber { background: var(--amber-bg); border: 1px solid var(--amber-border); color: #92400e; }
    .callout-gray  { background: var(--bg); border: 1px solid var(--border); color: var(--text-2); }
    .callout-title { font-weight: 600; margin-bottom: 4px; }

    /* ── Stage indicator ── */
    .stage-indicator { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-2); padding-bottom: 14px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
    .stage-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

    /* ── Form fields ── */
    .field-group { margin-bottom: 13px; }
    .field-group label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-3); margin-bottom: 5px; }
    .field-group select, .field-group input[type=date], .field-group input[type=text], .field-group textarea {
      width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; background: var(--surface); color: var(--text); outline: none; transition: border-color .12s;
    }
    .field-group select:focus, .field-group input:focus, .field-group textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
    .field-group textarea { resize: vertical; min-height: 76px; }
    .cb-row { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
    .cb-row input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
    .cb-row label { font-size: 13px; color: var(--text); cursor: pointer; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    @media (max-width: 700px) { .two-col, .three-col { grid-template-columns: 1fr; } }

    .stat-row { display: flex; gap: 28px; flex-wrap: wrap; margin-bottom: 16px; }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-3); }
    .stat-val { font-size: 22px; font-weight: 700; }

    /* ── Buttons ── */
    .btn { padding: 7px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all .12s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #1e40af; }
    .btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
    .btn-secondary:hover { background: var(--bg); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-email { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green); }
    .btn-email:hover { background: #dcfce7; }
    .btn-email:disabled { background: var(--bg); border-color: var(--border); color: var(--text-3); cursor: not-allowed; }
    .icon-btn { padding: 4px 9px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 12px; color: var(--text-2); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; transition: all .12s; white-space: nowrap; }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

    .section-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }

    /* ── Info box / callout ── */
    .info-box { padding: 12px 15px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-size: 13px; color: var(--text-2); }

    /* ── Mini table ── */
    .mini-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .mini-table th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-3); padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: left; }
    .mini-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .mini-table tr:last-child td { border-bottom: none; }

    /* ── Modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .modal { background: var(--surface); border-radius: var(--r); box-shadow: 0 20px 60px rgba(0,0,0,.2); width: 460px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 18px 22px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 15px; font-weight: 600; }
    .modal-close-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-2); line-height: 1; padding: 2px 6px; }
    .modal-body { padding: 18px 22px; }
    .modal-footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 22px; right: 22px; padding: 11px 18px; border-radius: 7px; font-size: 13px; font-weight: 500; z-index: 2000; box-shadow: 0 4px 12px rgba(0,0,0,.12); transition: opacity .2s; }
    .toast-success { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green); }
    .toast-error   { background: var(--red-bg); border: 1px solid var(--red-border); color: #dc2626; }
    .toast-info    { background: #f0f9ff; border: 1px solid #bae6fd; color: #0369a1; }

    hr.div { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    .empty-state { text-align: center; padding: 44px 24px; }
    .empty-state h3 { font-size: 15px; color: var(--text-2); font-weight: 500; }
    .empty-state p { font-size: 13px; color: var(--text-3); margin-top: 6px; }
  </style>
</head>
<body>

<div id="loading-overlay" class="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-msg" id="loading-msg">Loading data…</div>
</div>

<header class="app-header">
  <div>
    <div class="app-title">Executive Suite</div>
    <div class="app-sub">Member Concierge Dashboard</div>
  </div>
</header>

<main class="main">
  <div id="error-banner" class="error-banner" style="display:none">
    <strong>Failed to load:</strong>
    <span id="error-msg"></span>
    <button class="btn btn-secondary btn-sm" onclick="loadAllData()" style="margin-left:auto">Retry</button>
  </div>

  <!-- VIEW 1 -->
  <div id="view-list">
    <div class="filter-bar">
      <div class="filter-btns">
        <button class="filter-btn active" data-filter="all"  onclick="setFilter('all')">All</button>
        <button class="filter-btn"        data-filter="cc"   onclick="setFilter('cc')">Chemistry Calls</button>
        <button class="filter-btn"        data-filter="tri"  onclick="setFilter('tri')">Tripartite</button>
        <button class="filter-btn"        data-filter="360"  onclick="setFilter('360')">360</button>
      </div>
      <input type="text" id="search-input" class="search-input" placeholder="Search by name or organization…" oninput="onSearch(this.value)">
      <span class="count-label" id="exec-count"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Executive</th>
            <th>Organization</th>
            <th>Coach</th>
            <th>Programs</th>
            <th>Status</th>
            <th>Flags</th>
          </tr>
        </thead>
        <tbody id="exec-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- VIEW 2 -->
  <div id="view-detail" style="display:none"></div>
</main>

<!-- Edit Executive Modal -->
<div id="edit-modal" class="modal-overlay" style="display:none" onclick="onModalOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Edit Executive</div>
      <button class="modal-close-btn" onclick="closeEditModal()">×</button>
    </div>
    <div class="modal-body" id="edit-modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-primary" id="edit-save-btn" onclick="saveExecutiveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<div id="toast" class="toast" style="display:none"></div>

<script>
/* ─────────────────────────────────────────
   CONFIG
───────────────────────────────────────── */
const BASE_ID  = 'apppHEjC8Cmj1CxuV';
const API_KEY = (() => {
  const k = sessionStorage.getItem('at_key') ||
            prompt('Enter your Airtable API key to continue:');
  if (k) sessionStorage.setItem('at_key', k);
  return k;
})();
const BASE_URL      = `https://api.airtable.com/v0/${BASE_ID}`;
const CHEM_TABLE_ID = 'tblNGm3IQcNrlbvth';

const TRIPARTITE_STATUSES = [
  'Not Started','Tripartite Introduced','Scheduling Link Sent',
  'Session Scheduled','Session Complete','Completed'
];
const THREESIXTY_STATUSES = [
  'Not Started','360 Introduced','Participant Form Sent',
  'Interview Invitations Sent','Interviews Scheduling','Interviews In Progress',
  'Interviews Complete','Synthesis In Progress','Synthesis Generated',
  'Debrief Scheduled','Completed'
];
const CHEM_STATUSES = [
  'Awaiting Matching','Not Started','Scheduling Sent','In progress',
  'Booking in progress','Booking Completed','Coach Selected','Stalled'
];

/* ─────────────────────────────────────────
   STATE
───────────────────────────────────────── */
const S = {
  executives: [], programs: [], chemCalls: [],
  coaches: [], participants: [], documents: [],
  // lookup maps
  coachMap: {}, programMap: {}, chemCallMap: {},
  execPrograms: {}, execChemCalls: {},
  progParticipants: {}, progDocuments: {},
  // on-demand session data keyed by Chemistry Call ID
  chemCallSessions: {},
  // tracks coach selection made in current session (chemCallId -> {name, date})
  chemCoachSelection: {},
  // view state
  filter: 'all', search: '',
  selectedExecId: null,
  // coach picker (inline, in detail header) — mode: 'change' | 'assign' | null
  coachPicker: { mode: null, loading: false, coaches: null, selectedId: '', busy: false, awaitProgramAssign: false },
  // post-disconnect amber banner (cleared on next detail navigation or by user)
  disconnectWarning: false,
  // create chemistry call inline form
  createChem: { open: false, loading: false, coaches: null, busy: false,
                coach1: '', coach2: '', coach3: '', executiveContext: '', internalNotes: '' },
  // create program inline form — type: 'Tripartite' | 'Qualitative 360' | null
  createProgram: { type: null, busy: false,
                   startDate: '', totalSessions: '', sequenceOrder: '', strategicContext: '', internalNotes: '' },
};

/* ─────────────────────────────────────────
   API
───────────────────────────────────────── */
async function fetchAll(tableName, extraParams) {
  let records = [], offset;
  do {
    const p = new URLSearchParams(extraParams || {});
    if (offset) p.set('offset', offset);
    const r = await fetch(`${BASE_URL}/${encodeURIComponent(tableName)}?${p}`, {
      headers: { Authorization: `Bearer ${API_KEY}` }
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message || `HTTP ${r.status}`); }
    const d = await r.json();
    records.push(...d.records);
    offset = d.offset;
  } while (offset);
  return records;
}

async function patchRec(tableName, id, fields) {
  const r = await fetch(`${BASE_URL}/${encodeURIComponent(tableName)}/${id}`, {
    method: 'PATCH',
    headers: { Authorization: `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields }),
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message || `HTTP ${r.status}`); }
  return await r.json();
}

async function createRec(tableName, fields) {
  const r = await fetch(`${BASE_URL}/${encodeURIComponent(tableName)}`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields }),
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message || `HTTP ${r.status}`); }
  return await r.json();
}

async function fetchRecord(tableName, id) {
  const r = await fetch(`${BASE_URL}/${encodeURIComponent(tableName)}/${id}`, {
    headers: { Authorization: `Bearer ${API_KEY}` }
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message || `HTTP ${r.status}`); }
  return await r.json();
}

/* ─────────────────────────────────────────
   FIELD ACCESSORS
───────────────────────────────────────── */
const f    = (rec, k) => rec?.fields?.[k];
const fStr = (rec, k) => f(rec, k) || '';
const fArr = (rec, k) => f(rec, k) || [];
const fLu  = (rec, k) => fArr(rec, k)[0] || null;
const fBool= (rec, k) => !!f(rec, k);

function formatDate(v) {
  if (!v) return '—';
  const d = new Date(v);
  return isNaN(d) ? '—' : d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}
function isoDate(v) { return v ? String(v).split('T')[0] : ''; }
function todayISO() { return new Date().toISOString().split('T')[0]; }

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function daysSince(v) {
  if (!v) return Infinity;
  const d = new Date(v);
  return isNaN(d) ? Infinity : Math.floor((Date.now() - d) / 86400000);
}

function businessDaysSince(dateStr) {
  if (!dateStr) return 0;
  const start = new Date(dateStr + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  if (start >= today) return 0;
  let count = 0;
  const d = new Date(start);
  d.setDate(d.getDate() + 1);
  while (d <= today) {
    if (d.getDay() !== 0 && d.getDay() !== 6) count++;
    d.setDate(d.getDate() + 1);
  }
  return count;
}

function isStalled(prog) {
  const la = f(prog,'Last Activity Date');
  const sd = f(prog,'Start Date');
  return la ? daysSince(la) > 14 : (sd ? daysSince(sd) > 14 : false);
}

function statusClass(s) {
  if (!s) return 'b-gray';
  const l = s.toLowerCase();
  if (['completed','session complete','interviews complete','booking completed','coach selected'].some(x => l===x)) return 'b-green';
  if (l==='not started'||l==='awaiting matching') return 'b-gray';
  if (l==='stalled') return 'b-red';
  return 'b-blue';
}

function findCoachSession(sessions, coachId) {
  if (!coachId || !sessions) return null;
  return sessions.find(s => fArr(s,'Chem Call Coach').includes(coachId)) || null;
}

   DATA LOADING
───────────────────────────────────────── */
async function loadAllData() {
  document.getElementById('loading-overlay').style.display = 'flex';
  document.getElementById('error-banner').style.display = 'none';
  const setMsg = m => document.getElementById('loading-msg').textContent = m;
  try {
    setMsg('Loading coaches…');
    S.coaches = await fetchAll('Coaches');
    S.coachMap = {};
    S.coaches.forEach(c => S.coachMap[c.id] = c);

    setMsg('Loading records…');
    const [execs, progs, chems, parts, docs] = await Promise.all([
      fetchAll('Executives'), fetchAll('Programs'), fetchAll('Chemistry Calls'),
      fetchAll('Participants'), fetchAll('Documents'),
    ]);
    S.executives = execs; S.programs = progs; S.chemCalls = chems;
    S.participants = parts; S.documents = docs;

    setMsg('Building index…');
    buildMaps();
    document.getElementById('loading-overlay').style.display = 'none';
    renderList();
  } catch(err) {
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('error-banner').style.display = 'flex';
    document.getElementById('error-msg').textContent = err.message;
  }
}

async function fetchChemCallSessions(chemId) {
  const formula = `FIND("${chemId}",ARRAYJOIN({Chemistry Call},""))`;
  const sessions = await fetchAll('Sessions', { filterByFormula: formula });
  S.chemCallSessions[chemId] = sessions;
  return sessions;
}

function buildMaps() {
  S.programMap = {}; S.execPrograms = {};
  S.programs.forEach(p => {
    S.programMap[p.id] = p;
    fArr(p,'Executive').forEach(eid => {
      (S.execPrograms[eid] = S.execPrograms[eid] || []).push(p);
    });
  });
  S.chemCallMap = {}; S.execChemCalls = {};
  S.chemCalls.forEach(c => {
    S.chemCallMap[c.id] = c;
    fArr(c,'Executive').forEach(eid => {
      (S.execChemCalls[eid] = S.execChemCalls[eid] || []).push(c);
    });
  });
  S.progParticipants = {};
  S.participants.forEach(p => {
    fArr(p,'Program').forEach(pid => {
      (S.progParticipants[pid] = S.progParticipants[pid] || []).push(p);
    });
  });
  S.progDocuments = {};
  S.documents.forEach(d => {
    fArr(d,'Program').forEach(pid => {
      (S.progDocuments[pid] = S.progDocuments[pid] || []).push(d);
    });
  });
}

function updateProgInState(rec) {
  const i = S.programs.findIndex(p => p.id === rec.id);
  if (i !== -1) S.programs[i] = rec; else S.programs.push(rec);
  buildMaps();
}
function updateChemInState(rec) {
  const i = S.chemCalls.findIndex(c => c.id === rec.id);
  if (i !== -1) S.chemCalls[i] = rec; else S.chemCalls.push(rec);
  buildMaps();
}
function updateExecInState(rec) {
  const i = S.executives.findIndex(e => e.id === rec.id);
  if (i !== -1) S.executives[i] = rec; else S.executives.push(rec);
  buildMaps();
}
function updatePartInState(rec) {
  const i = S.participants.findIndex(p => p.id === rec.id);
  if (i !== -1) S.participants[i] = rec; buildMaps();
}
function updateDocInState(rec) {
  const i = S.documents.findIndex(d => d.id === rec.id);
  if (i !== -1) S.documents[i] = rec; buildMaps();
}

function setFilter(val) {
  S.filter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === val));
  renderList();
}
function onSearch(val) { S.search = val.trim().toLowerCase(); renderList(); }

function hasPriorityFlag(exec) {
  // Program issues
  if ((S.execPrograms[exec.id] || []).some(p => fBool(p,'Needs Attention') || isStalled(p))) return true;
  // CC follow-up due
  if (fBool(exec,'Has Chemistry Calls')) {
    const chem = (S.execChemCalls[exec.id] || [])[0];
    if (chem) {
      const schedSent = fBool(chem,'Scheduling Email Sent');
      const completed = Number(f(chem,'Session Completed') ?? 0);
      const schedDate = f(chem,'Scheduling Email Date');
      if (schedSent && completed < 3 && businessDaysSince(schedDate) > 5) return true;
    }
  }
  return false;
}

function getFilteredExecs() {
  let execs = [...S.executives];
  if (S.filter === 'cc')  execs = execs.filter(e => fBool(e,'Has Chemistry Calls'));
  if (S.filter === 'tri') execs = execs.filter(e => fBool(e,'Has Tripartite'));
  if (S.filter === '360') execs = execs.filter(e => fBool(e,'Has 360'));
  if (S.search) {
    execs = execs.filter(e =>
      fStr(e,'Executive Name').toLowerCase().includes(S.search) ||
      fStr(e,'Organization / Partner').toLowerCase().includes(S.search)
    );
  }
  execs.sort((a,b) => {
    const ap = hasPriorityFlag(a), bp = hasPriorityFlag(b);
    if (ap && !bp) return -1; if (!ap && bp) return 1;
    return fStr(a,'Executive Name').localeCompare(fStr(b,'Executive Name'));
  });
  return execs;
}

function renderList() {
  const execs = getFilteredExecs();
  document.getElementById('exec-count').textContent = `${execs.length} executive${execs.length !== 1 ? 's' : ''}`;
  const tbody = document.getElementById('exec-tbody');
  if (!execs.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><h3>No executives found</h3><p>Try adjusting your filter or search</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = execs.map(execRow).join('');
}

function execRow(exec) {
  const progs  = S.execPrograms[exec.id] || [];
  const hasCC  = fBool(exec,'Has Chemistry Calls');
  const hasT   = fBool(exec,'Has Tripartite');
  const has360 = fBool(exec,'Has 360');
  const chem   = (S.execChemCalls[exec.id] || [])[0] || null;

  // Coach name
  const coachIds = fArr(exec,'Coach');
  const coachName = coachIds[0] ? (S.coachMap[coachIds[0]]?.fields?.['Coach Name'] || '—') : '—';

  // Pills
  const pills = [
    hasCC  ? `<span class="pill pill-cc">CC</span>` : '',
    hasT   ? `<span class="pill pill-t">T</span>`   : '',
    has360 ? `<span class="pill pill-360">360</span>`: '',
  ].filter(Boolean).join('');

  // Status badges — CC status first if applicable
  let statusParts = [];
  if (hasCC) {
    if (chem) {
      const cs = f(chem,'Status') || 'Not Started';
      statusParts.push(`<span class="badge ${statusClass(cs)}" title="Chemistry Call">${esc(cs)}</span>`);
    } else {
      statusParts.push(`<span class="badge b-gray" title="No Chemistry Call record yet">Awaiting Record</span>`);
    }
  }
  progs.forEach(p => {
    const st = f(p,'Status') || 'Not Started';
    statusParts.push(`<span class="badge ${statusClass(st)}">${esc(st)}</span>`);
  });
  const statusBadges = statusParts.join(' ');

  // Flags
  const needsAttn = progs.some(p => fBool(p,'Needs Attention'));
  const stalled   = progs.some(p => isStalled(p));
  let followUpDue = false;
  if (hasCC && chem) {
    const schedSent = fBool(chem,'Scheduling Email Sent');
    const completed = Number(f(chem,'Session Completed') ?? 0);
    const schedDate = f(chem,'Scheduling Email Date');
    if (schedSent && completed < 3 && businessDaysSince(schedDate) > 5) followUpDue = true;
  }
  const flags = [
    needsAttn   ? `<span class="badge b-amber">⚠ Attention</span>`  : '',
    stalled     ? `<span class="badge b-red">Stalled</span>`         : '',
    followUpDue ? `<span class="badge b-amber">Follow-up Due</span>` : '',
  ].filter(Boolean).join(' ');

  return `
    <tr onclick="showDetail('${exec.id}')">
      <td><span class="exec-name-link">${esc(fStr(exec,'Executive Name')) || '<em class="empty-cell">—</em>'}</span></td>
      <td>${esc(fStr(exec,'Organization / Partner')) || '<span class="empty-cell">—</span>'}</td>
      <td>${esc(coachName)}</td>
      <td>${pills || '<span class="empty-cell">—</span>'}</td>
      <td>${statusBadges || '<span class="empty-cell">—</span>'}</td>
      <td>${flags || '<span class="empty-cell">—</span>'}</td>
    </tr>`;
}

function getChemStage(chem) {
  if (!chem) return 0;
  const status    = f(chem,'Status') || '';
  const schedSent = fBool(chem,'Scheduling Email Sent');
  const completed = Number(f(chem,'Session Completed') ?? 0);
  if (status === 'Coach Selected') return 4;
  if (completed >= 3)              return 3;
  if (schedSent)                   return 2;
  return 1;
}

/* ── Stage 4: coach selected, awaiting formal program ── */
function renderChemStage4(exec, chem) {
  const cid = chem.id;
  const selectionDate = f(chem,'Selection Date');
  const sessionSel    = S.chemCoachSelection[cid];

  let selectedCoachName = sessionSel?.name || '';
  if (!selectedCoachName) {
    const coachIds = fArr(exec,'Coach');
    selectedCoachName = coachIds[0] ? (S.coachMap[coachIds[0]]?.fields?.['Coach Name'] || '') : '';
  }

  const hasT   = fBool(exec,'Has Tripartite');
  const has360 = fBool(exec,'Has 360');
  const programsLinked = hasT || has360;

  return `
    <div class="stage-indicator" style="border-color:var(--green-border)">
      <div class="stage-dot" style="background:var(--green)"></div>
      Coach selected${selectedCoachName ? `: <strong style="color:var(--text)">${esc(selectedCoachName)}</strong>` : ''}
      ${selectionDate ? ` on ${formatDate(selectionDate)}` : ''}

    <div class="callout callout-gray" style="margin-bottom:14px">
      <div class="callout-title">Next step: Admin action required</div>

      The Concierge should not proceed to program kickoff until Admin confirms this is complete.
    </div>

    ${programsLinked ? `
    <div class="callout callout-green">
      <div class="callout-title">✓ Program records detected</div>

}

    showToast('Saved','success');
  } catch(e) { showToast('Error: '+e.message,'error'); }
}

async function saveDocField(docId, fields) {
  try {
    showToast('Saving…','info');

    updateDocInState(updated);
    showToast('Saved','success');
  } catch(e) { showToast('Error: '+e.message,'error'); }
}

async function saveSessionStatus(sessionId, chemId, displayValue) {
  const statusMap = { 'Booked': 'Scheduled', 'Completed': 'Completed', 'Cancelled': 'Cancelled' };
  const airtableStatus = statusMap[displayValue] ?? displayValue;
  try {
    showToast('Saving…','info');
    const updated = await patchRec('Sessions', sessionId, { 'Status': airtableStatus });
    const arr = S.chemCallSessions[chemId] || [];
    const idx = arr.findIndex(s => s.id === sessionId);
    if (idx !== -1) arr[idx] = updated; else arr.push(updated);
    S.chemCallSessions[chemId] = arr;
    const chemUpdated = await fetchRecord('Chemistry Calls', chemId);
    updateChemInState(chemUpdated);
    showToast('Session status saved','success');
    renderDetail();
  } catch(e) { showToast('Error: '+e.message,'error'); }
}

async function saveSessionDate(sessionId, chemId, dateValue) {
  try {
    showToast('Saving…','info');
    const updated = await patchRec('Sessions', sessionId, { 'Scheduled Date': dateValue || null });
    const arr = S.chemCallSessions[chemId] || [];
    const idx = arr.findIndex(s => s.id === sessionId);
    if (idx !== -1) arr[idx] = updated; else arr.push(updated);
    S.chemCallSessions[chemId] = arr;
    showToast('Date saved','success');
  } catch(e) { showToast('Error: '+e.message,'error'); }
}

async function confirmCoachSelection(chemId) {
  const sel = document.getElementById(`coach-select-${chemId}`);
  const coachId = sel?.value;
  if (!coachId) { showToast('Please select a coach','error'); return; }
  const coachName = S.coachMap[coachId]?.fields?.['Coach Name'] || 'Selected coach';
  const today = todayISO();
  try {
    showToast('Saving…','info');
    const updated = await patchRec('Chemistry Calls', chemId, {
      'Status': 'Coach Selected',
      'Selection Date': today,
    });
    updateChemInState(updated);
    S.chemCoachSelection[chemId] = { name: coachName, date: today };
    showToast('Coach selection recorded','success');
    setTimeout(() => renderDetail(), 400);
  } catch(e) { showToast('Error: '+e.message,'error'); }
}

async function fetchCoachesFresh() {
  const recs = await fetchAll('Coaches');
  return recs.map(r => ({
    id: r.id,
    name: r.fields?.['Coach Name'] || '(unnamed)',
    email: r.fields?.['Coach Email'] || '',
  })).sort((a,b) => a.name.localeCompare(b.name));
}

async function openCoachPicker(mode) {
  S.coachPicker = { mode, loading: true, coaches: null, selectedId: '', busy: false, awaitProgramAssign: false };
  renderDetail();
  try {
    const coaches = await fetchCoachesFresh();
    S.coachPicker.coaches = coaches;
    S.coachPicker.loading = false;
    renderDetail();
  } catch (e) {
    showToast('Error loading coaches: ' + e.message, 'error');
    S.coachPicker = { mode: null, loading: false, coaches: null, selectedId: '', busy: false, awaitProgramAssign: false };
    renderDetail();
  }
}

function cancelCoachPicker() {
  S.coachPicker = { mode: null, loading: false, coaches: null, selectedId: '', busy: false, awaitProgramAssign: false };
  renderDetail();
}

async function confirmCoachPicker() {
  const sel = document.getElementById('coach-picker-select');
  const coachId = sel?.value || '';
  if (!coachId) { showToast('Please select a coach', 'error'); return; }
  S.coachPicker.selectedId = coachId;
  S.coachPicker.busy = true;
  renderDetail();
  try {
    showToast('Saving…', 'info');
    const updated = await patchRec('Executives', S.selectedExecId, { 'Coach': [coachId] });
    updateExecInState(updated);
    showToast(S.coachPicker.mode === 'change' ? 'Coach updated' : 'Coach assigned', 'success');
    // Capability 1 spec: if assign mode and exec has linked Programs missing a coach, offer cascade
    const progsNoCoach = (S.execPrograms[S.selectedExecId] || []).filter(p => fArr(p, 'Coach').length === 0);
    if (S.coachPicker.mode === 'assign' && progsNoCoach.length > 0) {
      S.coachPicker.busy = false;
      S.coachPicker.awaitProgramAssign = true;
      renderDetail();
    } else {
      cancelCoachPicker();
    }
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
    S.coachPicker.busy = false;
    renderDetail();
  }
}

async function answerProgramAssign(yes) {
  const coachId = S.coachPicker.selectedId;
  if (!yes || !coachId) { cancelCoachPicker(); return; }
  S.coachPicker.busy = true;
  renderDetail();
  try {
    const progsNoCoach = (S.execPrograms[S.selectedExecId] || []).filter(p => fArr(p, 'Coach').length === 0);
    showToast('Updating programs…', 'info');
    for (const p of progsNoCoach) {
      const updated = await patchRec('Programs', p.id, { 'Coach': [coachId] });
      updateProgInState(updated);
    }
    showToast(`Coach assigned to ${progsNoCoach.length} program${progsNoCoach.length===1?'':'s'}`, 'success');
    cancelCoachPicker();
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
    S.coachPicker.busy = false;
    renderDetail();
  }
}

function openDisconnectConfirm() {
  const exec = S.executives.find(e => e.id === S.selectedExecId);
  if (!exec) return;
  const coachIds = fArr(exec, 'Coach');
  const coachRec = coachIds[0] ? S.coachMap[coachIds[0]] : null;
  const coachName = coachRec?.fields?.['Coach Name'] || 'this coach';
  const execName = fStr(exec, 'Executive Name') || 'this executive';
  showConfirmModal({
    title: 'Disconnect coach',
    message: `Are you sure you want to disconnect ${esc(coachName)} from ${esc(execName)}? This will also remove them from any associated program records.`,
    confirmLabel: 'Disconnect',
    danger: true,
    onConfirm: confirmDisconnectCoach,
  });
}

async function confirmDisconnectCoach() {
  const execId = S.selectedExecId;
  const setBusy = (b) => { S.coachPicker.busy = b; };
  setBusy(true);
  // Find linked, non-completed programs to cascade-clear
  const cascadeProgs = (S.execPrograms[execId] || []).filter(p => {
    if (fArr(p, 'Coach').length === 0) return false;
    return f(p, 'Status') !== 'Completed';
  });
  try {
    showToast('Disconnecting…', 'info');
    const updatedExec = await patchRec('Executives', execId, { 'Coach': [] });
    updateExecInState(updatedExec);
    for (const p of cascadeProgs) {
      const updated = await patchRec('Programs', p.id, { 'Coach': [] });
      updateProgInState(updated);
    }
    S.disconnectWarning = execId;
    showToast(cascadeProgs.length
      ? `Coach disconnected; ${cascadeProgs.length} program${cascadeProgs.length===1?'':'s'} cleared`
      : 'Coach disconnected', 'success');
    closeConfirmModal();
    setBusy(false);
    renderDetail();
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
    setBusy(false);
    closeConfirmModal();
    renderDetail();
  }
}

/* Generic confirm modal (DOM-injected so it doesn't depend on static markup) */
function showConfirmModal({ title, message, confirmLabel = 'Confirm', danger = false, onConfirm }) {
  closeConfirmModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'confirm-modal-overlay';
  overlay.style.display = 'flex';
  overlay.innerHTML = `
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <div class="modal-title">${esc(title)}</div>
        <button class="modal-close-btn" onclick="closeConfirmModal()">×</button>
      </div>
      <div class="modal-body"><div style="font-size:14px;line-height:1.5">${message}</div></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeConfirmModal()">Cancel</button>
        <button class="btn" id="confirm-modal-ok"
                style="${danger ? 'background:#dc2626;color:#fff;border:1px solid #b91c1c' : 'background:var(--accent);color:#fff'}">
          ${esc(confirmLabel)}
        </button>
      </div>
    </div>`;
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeConfirmModal(); });
  document.body.appendChild(overlay);
  document.getElementById('confirm-modal-ok').addEventListener('click', async () => {
    document.getElementById('confirm-modal-ok').disabled = true;
    document.getElementById('confirm-modal-ok').textContent = 'Working…';
    try { await onConfirm(); } catch (e) { showToast('Error: ' + e.message, 'error'); closeConfirmModal(); }
  });
}
function closeConfirmModal() {
  const el = document.getElementById('confirm-modal-overlay');
  if (el) el.remove();
}

async function clipboardCopy(text) {
  if (navigator.clipboard && window.isSecureContext) {
    try { await navigator.clipboard.writeText(text); return true; } catch(_) {}
  }
  try {
    const ta = Object.assign(document.createElement('textarea'), {
      value: text, style: 'position:fixed;top:-9999px;left:-9999px'
    });
    document.body.appendChild(ta); ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  } catch(e) { return false; }
}

async function clipboardCopyRich(html, plain) {
  try {
    if (navigator.clipboard?.write) {
      await navigator.clipboard.write([new ClipboardItem({
        'text/html':  new Blob([html],  { type: 'text/html' }),
        'text/plain': new Blob([plain], { type: 'text/plain' }),
      })]);
      return true;
    }
  } catch(e) { console.warn('Rich clipboard write failed:', e.message); }
  return clipboardCopy(plain);
}

async function copyAndConfirm(html, plain, btn) {
  const ok = await clipboardCopyRich(html, plain);
  if (!ok) { showToast('Copy failed — please copy manually','error'); return; }
  const orig = btn.textContent;
  btn.textContent = '✓ Copied!';
  btn.style.background = 'var(--green-bg)';
  setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 2200);
}

async function copyLink(btn) {
  const url = btn.dataset.url;
  if (!url) return;
  const ok = await clipboardCopy(url);
  if (!ok) { showToast('Copy failed — please copy manually','error'); return; }
  const orig = btn.textContent;
  btn.textContent = '✓ Copied!';
  btn.style.background = 'var(--green-bg)';
  setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 2200);
}

/* ─────────────────────────────────────────
   TOAST
───────────────────────────────────────── */
let toastTimer;
function showToast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast toast-${type}`;
  el.style.display = 'block';
  el.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    el.style.opacity = '0';
    setTimeout(() => { el.style.display = 'none'; }, 200);
  }, type==='info' ? 1200 : 2800);
}
